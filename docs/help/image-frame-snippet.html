<!--
  ⚠️ Google Drive 链接在 <img src> 里经常无法显示（Google 限制站外引用）。
  推荐做法见 docs/help/GOOGLE_SITES_IMPORT.md「图片无法显示」一节。

  Google Sites 可靠做法：
  1. 在 Sites 页面「插入 → 图片 → 上传」截图（不要用 Drive 链接）
  2. 右键页面上已显示的图片 →「复制图片地址」
     正确格式类似：https://lh3.googleusercontent.com/...  （不是 drive.google.com/file/d/...）
  3. 插入 → 嵌入 → 嵌入代码，粘贴下面整段，把 YOUR_IMAGE_URL 换成该 lh3 地址
-->

<figure style="margin:0;padding:12px;border:2px solid #d2d2d7;border-radius:12px;background:#fafafa;text-align:center;">
  <img
    src="YOUR_IMAGE_URL"
    alt="ScreenVoiceRec — areas 1 Source, 2 Export Format, 3 Controls, 4 Playback"
    style="max-width:100%;height:auto;border-radius:10px;border:1px solid #d2d2d7;display:block;margin:0 auto;"
  >
  <p style="margin:10px 0 0;font-size:13px;color:#6e6e73;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">
    1 Source · 2 Export Format · 3 Controls · 4 Playback
  </p>
</figure>
